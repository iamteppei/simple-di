name: CI/CD

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Test, Coverage
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORG: ${{ secrets.SONAR_ORG }}
      

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build and run tests
        run: ./gradlew --no-daemon clean build :simple-di-core:jacocoTestReport

      - name: SonarQube Scan
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != ''
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.projectVersion=${{ github.sha }}
            -Dsonar.organization=${{ env.SONAR_ORG }}
            -Dsonar.sources=simple-di-api/src/main/java,simple-di-core/src/main/java
            -Dsonar.tests=simple-di-core/src/test/java
            -Dsonar.java.binaries=simple-di-api/build/classes/java/main,simple-di-core/build/classes/java/main
            -Dsonar.java.test.binaries=simple-di-core/build/classes/java/test
            -Dsonar.coverage.jacoco.xmlReportPaths=simple-di-core/build/reports/jacoco/test/jacocoTestReport.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            simple-di-core/build/reports/tests/test
            simple-di-core/build/test-results/test
          if-no-files-found: warn

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            simple-di-core/build/reports/jacoco/test
            simple-di-core/build/reports/jacoco/test/jacocoTestReport.xml
          if-no-files-found: warn

      - name: Upload built jars
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            simple-di-api/build/libs/*.jar
            simple-di-core/build/libs/*.jar
          if-no-files-found: warn

  release:
    name: Release To Maven Repository
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Publish to Maven repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_VERSION#v}"
          ./gradlew --no-daemon clean publish -PprojectVersion="$VERSION"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            simple-di-api/build/libs/*.jar
            simple-di-core/build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

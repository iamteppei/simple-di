name: CI/CD

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Test, Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build and run tests
        run: ./gradlew --no-daemon clean build :simple-di-core:jacocoTestReport

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            simple-di-core/build/reports/tests/test
            simple-di-core/build/test-results/test
          if-no-files-found: warn

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            simple-di-core/build/reports/jacoco/test
            simple-di-core/build/reports/jacoco/test/jacocoTestReport.xml
          if-no-files-found: warn

      - name: Upload built jars
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            simple-di-api/build/libs/*.jar
            simple-di-core/build/libs/*.jar
          if-no-files-found: warn

  release:
    name: Release Artifacts
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build release artifacts
        run: ./gradlew --no-daemon clean build

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            simple-di-api/build/libs/*.jar
            simple-di-core/build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
